<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Muskelfinder</title>
    <script>
        if (location.hostname.includes("github.io")) {
            const parts = location.pathname.split('/').filter(Boolean);
            const first = parts[0] || '';
            const base = document.createElement('base');
            base.href = first && !first.endsWith('.html') ? `/${first}/` : '/';
            document.head.appendChild(base);
        }
    </script>
    <link rel="icon" type="image/png" href="assets/icons/muskelfinder-icon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="page-search">
    <header>
        <h1><img src="assets/icons/muskelfinder-icon.png" class="header-logo" alt="">Muskelfinder</h1>
        <p>Finde Muskeln, ihre Funktionen und Innervationen</p>
        <a href="quizzes/flashcards.html" class="back-button">Lernen</a>
    </header>

    <main>
        <div id="loading">Lade Muskeldaten...</div>

        <section id="search-section">
            <input type="text" id="search-bar" placeholder="Muskelname suchen..." aria-label="Suchfeld für Muskelnamen" autocomplete="off">
        </section>

        <section id="filters-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="region-filter">Region</label>
                    <select id="region-filter" aria-label="Nach Region filtern">
                        <option value="">Alle Regionen</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="joint-filter">Gelenk</label>
                    <select id="joint-filter" aria-label="Nach Gelenk filtern">
                        <option value="">Alle Gelenke</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="movement-filter">Bewegung</label>
                    <select id="movement-filter" aria-label="Nach Bewegung filtern">
                        <option value="">Alle Bewegungen</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="nerve-filter">Innervation</label>
                    <select id="nerve-filter" aria-label="Nach Innervation filtern">
                        <option value="">Alle Innervationen</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <span id="result-count"></span>
                <button id="reset-filters" type="button">Filter zurücksetzen</button>
            </div>
        </section>

        <section id="results-section">
            <ul id="result-list"></ul>
        </section>
    </main>

    <footer>© 2026 Muskelfinder</footer>

    <script src="assets/js/gamification.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/data-loader.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
