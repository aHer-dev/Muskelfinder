<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bild-Quiz</title>
  <link rel="icon" type="image/png" href="../assets/icons/muskelfinder-icon.png">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="page-quiz-image">
  <header>
    <h1><img src="../assets/icons/muskelfinder-icon.png" class="header-logo" alt="">Bild-Quiz</h1>
    <nav>
      <a href="quiz.html" class="back-button">Zurück</a>
    </nav>
  </header>
  <main>
    <div class="quiz-container">

      <!-- Modus-Auswahl -->
      <div class="img-mode-tabs" id="img-mode-tabs">
        <button class="img-mode-tab active" data-mode="bild-name">Bild → Name</button>
        <button class="img-mode-tab" data-mode="name-bild">Name → Bild</button>
      </div>

      <h2 id="quizHead"></h2>

      <!-- Bild-Name: großes Bild oben -->
      <div class="image-container" id="main-image-wrap">
        <img id="mainImage" src="" alt="Muskelbild">
      </div>

      <!-- Name-Bild: Muskelname als Zielangabe -->
      <div id="target-name-wrap" class="img-target-name" hidden></div>

      <div id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="quiz-stats-bar">
      <div class="qsb-stats">
        <span class="qsb-item qsb-correct">✓ <span id="correctCount">0</span></span>
        <span class="qsb-item qsb-wrong">✗ <span id="wrongCount">0</span></span>
        <span class="qsb-item qsb-acc"><span id="accuracy">0%</span></span>
        <span class="qsb-item qsb-progress" id="qs-progress">0 / 10</span>
      </div>
      <div id="quiz-xp-bar"></div>
    </div>
    <div id="quiz-summary" hidden></div>
    <div id="imageModal" class="modal" style="display: none;">
      <span class="closeButton">×</span>
      <img id="modalImage" class="modalContent" alt="Vergrößertes Muskelbild">
    </div>
  </main>
  <script src="../assets/js/gamification.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/data-loader.js"></script>
  <script src="../assets/js/progress.js"></script>
  <script src="../assets/js/quiz-filter.js"></script>
  <script src="../assets/js/quiz-session.js"></script>
  <script src="../assets/js/image-match-quiz.js"></script>
</body>

</html>
